name: CLA Assent Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  cla-assent-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required CLA assent statement is present
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          if printf '%s' "$PR_BODY" | grep -Eq 'I have read and agree to the Contributor Assignment Agreement in CLA\.md\.[[:space:]]*Signed electronically:[[:space:]]*[^[:space:]].+'; then
            echo "CLA assent statement found."
          else
            echo "The pull request body must include the required CLA assent statement." >&2
            echo "Required text:" >&2
            echo "I have read and agree to the Contributor Assignment Agreement in CLA.md." >&2
            echo "Signed electronically: <your name>" >&2
            exit 1
          fi
